spring:
  application:
    name: spring_ai
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5.4-nano
          temperature: 0.9
      embeddings:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
  datasource:
    url: jdbc:postgresql://localhost:5434/my-vectortest-db
    username: my-user
    password: password
logging:
  level:
    org.springframework.ai:
      chat.client: DEBUG